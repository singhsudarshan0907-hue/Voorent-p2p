# /etc/nginx/sites-available/voorent.conf
# Replace api.yourdomain.com with your actual domain

# ── Rate limiting ─────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=otp:10m  rate=5r/m;

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────
server {
    listen 80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS — API reverse proxy ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # SSL — issued by Certbot (Let's Encrypt, free)
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types application/json;

    # OTP endpoint — very strict rate limit (5 req/min per IP)
    location /api/auth/send-otp {
        limit_req zone=otp burst=2 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # All other API routes — 30 req/min per IP
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10M;
    }

    # Swagger UI (disable in production if desired)
    location /swagger {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }
}
