# /etc/nginx/sites-available/voorent.conf
# Serves p2p.voorent.com (SPA + API reverse proxy on same domain)

# ── Rate limiting ─────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=otp:10m  rate=5r/m;

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────
server {
    listen 80;
    server_name p2p.voorent.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name p2p.voorent.com;

    ssl_certificate     /etc/letsencrypt/live/p2p.voorent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p2p.voorent.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Security headers ──────────────────────────────────────────
    # HSTS — tell browsers to always use HTTPS (preload-ready)
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options            "DENY" always;

    # No MIME sniffing
    add_header X-Content-Type-Options     "nosniff" always;

    # Referrer info — only send origin on cross-origin requests
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # Permissions — lock down unused browser APIs
    add_header Permissions-Policy
        "geolocation=(), camera=(), microphone=(), payment=(self https://checkout.razorpay.com), usb=(), magnetometer=(), gyroscope=()"
        always;

    # Content Security Policy
    # - Scripts: self + Razorpay checkout
    # - Styles: self + unsafe-inline (needed for Tailwind / JSX inline styles)
    # - Images: self + Unsplash + data URIs + blob (for camera/upload previews)
    # - Connects: self + Nominatim (geocoding) + Razorpay APIs
    # - Frames: Razorpay checkout iframe
    # - Objects/base: locked down
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' https://checkout.razorpay.com; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: blob: https://images.unsplash.com https://*.supabase.co; \
         connect-src 'self' https://nominatim.openstreetmap.org https://api.razorpay.com https://checkout.razorpay.com; \
         frame-src https://api.razorpay.com https://checkout.razorpay.com; \
         font-src 'self' data:; \
         object-src 'none'; \
         base-uri 'self'; \
         form-action 'self'; \
         frame-ancestors 'none';"
        always;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Serve the React SPA ───────────────────────────────────────
    root /home/singhsudarshan0907/voorent-publish/frontend;
    index index.html;

    # Content-hashed Vite assets — cache forever (immutable)
    location /assets/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Re-add security headers (add_header is not inherited into sub-locations in some nginx versions)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
    }

    # robots.txt — serve real file if it exists, else 404 (not SPA fallback)
    location = /robots.txt {
        try_files $uri =404;
        add_header Content-Type "text/plain" always;
    }

    # sitemap.xml — same
    location = /sitemap.xml {
        try_files $uri =404;
        add_header Content-Type "application/xml" always;
    }

    # OTP endpoint — very strict rate limit (5 req/min per IP)
    location = /api/auth/send-otp {
        limit_req zone=otp burst=2 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # verify-otp — also rate-limited
    location = /api/auth/verify-otp {
        limit_req zone=otp burst=2 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # All other API routes — 30 req/min per IP
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 10M;
        # Pass cookies through cleanly (needed for httpOnly auth cookie)
        proxy_pass_header  Set-Cookie;
    }

    # Uploaded files (listing images, docs)
    location /uploads/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Swagger (disable in production if desired by removing this block)
    location /swagger {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # SPA fallback — all unmatched routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
